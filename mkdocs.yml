site_name: Termite Docs
site_url: https://mohammad-h93.github.io/docs-test/

nav:
  - Welcome to Termite: welcome.md
  - Create a Session: sessions.md
  - Integrate with CAD:
      - Integrate Sessions with CAD Software: integrate/index.md
      - Rhino:
          - Integrate Termite with Rhino: integrate/rhino/index.md
          - Sync: integrate/rhino/sync-index.md
          - Generate: integrate/rhino/generate-index.md

      - Grasshopper:
          - Integrate Termite with Grasshopper: integrate/grasshopper/index.md
          - Sync: integrate/grasshopper/sync-index.md
          - Generate: integrate/grasshopper/generate-index.md

      - Revit:
          - Sync: 'sync-revit.md'
          - Generate: 'generate-revit.md'

      - Archicad:
          - Sync: 'sync-archicad.md'
          - Generate: 'generate-archicad.md'
  - Export:
      - Export the generated layout: 'export-cad.md'
      - DWG: 'export-dwg.md'
      - BIM: 'export-bim.md'
  - Frequently asked questions: 'frequent-questions.md'


theme:
  font:
    text: Inter
    code: JetBrains Mono
  name: material
  features:
    - navigation.indexes

  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css