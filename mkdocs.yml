site_name: Termite Docs
site_url: https://mohammad-h93.github.io/docs-test/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Sessions: sessions.md
  - Grasshopper: grasshopper.md


theme:
  font:
    text: Inter
    code: JetBrains Mono
  name: material
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
